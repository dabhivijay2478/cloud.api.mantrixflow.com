<!-- Base layout for MantrixFlow email templates - matches apps/app/globals.css theme -->
<!-- Use {{logo_url}} for logo - UnoSend CDN or UNOSEND_LOGO_URL env -->
<!-- Theme: primary #00a859, secondary #007fff, accent #8a2be2, destructive #ef4444 -->

<style>
  body { font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #09090b; margin: 0; padding: 0; background: #ffffff; }
  .container { max-width: 600px; margin: 0 auto; padding: 24px; }
  .header { text-align: center; padding: 24px 0; border-bottom: 1px solid #e4e4e7; }
  .logo { height: 40px; width: auto; }
  .content { padding: 32px 0; }
  .btn { display: inline-block; padding: 12px 24px; background: #00a859; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 8px 8px 8px 0; }
  .btn-secondary { background: #007fff; color: #ffffff !important; }
  .btn-accent { background: #8a2be2; color: #ffffff !important; }
  .btn-destructive { background: #ef4444; color: #fafafa !important; }
  .footer { padding: 24px 0; border-top: 1px solid #e4e4e7; font-size: 12px; color: #71717a; text-align: center; }
  .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin: 16px 0; font-family: 'Geist Mono', monospace; font-size: 13px; color: #7f1d1d; }
  .stat { background: #f4f4f5; border-radius: 8px; padding: 16px; margin: 8px 0; }
  h1 { color: #09090b; font-size: 24px; margin: 0 0 16px 0; }
  p { margin: 0 0 12px 0; }
</style>
