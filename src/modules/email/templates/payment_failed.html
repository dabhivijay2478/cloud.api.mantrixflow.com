<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Failed - MantrixFlow</title>
  <style>body{font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#09090b;margin:0;padding:0;background:#fff}.container{max-width:600px;margin:0 auto;padding:24px}.header{text-align:center;padding:24px 0;border-bottom:1px solid #e4e4e7}.logo{height:40px;width:auto}.content{padding:32px 0}.btn{display:inline-block;padding:12px 24px;background:#ef4444;color:#fafafa!important;text-decoration:none;border-radius:8px;font-weight:600;margin:8px 8px 8px 0}.footer{padding:24px 0;border-top:1px solid #e4e4e7;font-size:12px;color:#71717a;text-align:center}</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="{{logo_url}}" alt="MantrixFlow" class="logo" />
    </div>
    <div class="content">
      <h1>Payment Failed</h1>
      <p>We could not process your payment of {{amount}} for <strong>{{org_name}}</strong>.</p>
      <p>Your account remains active for 7 days while we retry. Next retry: {{retry_date}}. Grace period ends: {{grace_period_end_date}}.</p>
      <p><a href="{{billing_url}}" class="btn">Update Payment Method</a></p>
    </div>
    <div class="footer">MantrixFlow — Data pipelines made simple</div>
  </div>
</body>
</html>
