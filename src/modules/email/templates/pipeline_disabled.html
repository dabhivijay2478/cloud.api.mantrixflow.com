<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Paused - MantrixFlow</title>
  <style>body{font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#09090b;margin:0;padding:0;background:#fff}.container{max-width:600px;margin:0 auto;padding:24px}.header{text-align:center;padding:24px 0;border-bottom:1px solid #e4e4e7}.logo{height:40px;width:auto}.content{padding:32px 0}.btn{display:inline-block;padding:12px 24px;background:#00a859;color:#fff!important;text-decoration:none;border-radius:8px;font-weight:600;margin:8px 8px 8px 0}.btn-secondary{background:#007fff;color:#fff!important}.footer{padding:24px 0;border-top:1px solid #e4e4e7;font-size:12px;color:#71717a;text-align:center}.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:16px 0;font-family:monospace;font-size:13px;color:#7f1d1d}</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="{{logo_url}}" alt="MantrixFlow" class="logo" />
    </div>
    <div class="content">
      <h1>Pipeline Automatically Paused</h1>
      <p>Pipeline <strong>{{pipeline_name}}</strong> has been paused after {{failure_count}} consecutive failures.</p>
      <div class="error-box">{{last_error_message}}</div>
      <p>The pipeline will not run again until you manually re-enable it.</p>
      <p>
        <a href="{{edit_pipeline_url}}" class="btn">Review and Fix Pipeline</a>
        <a href="{{support_url}}" class="btn btn-secondary">Contact Support</a>
      </p>
    </div>
    <div class="footer">
      MantrixFlow — Data pipelines made simple
    </div>
  </div>
</body>
</html>
